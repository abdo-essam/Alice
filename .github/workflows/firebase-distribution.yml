name: Distribute to Firebase App Distribution

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Firebase Service Account
        # The Firebase App Distribution Gradle plugin uses GOOGLE_APPLICATION_CREDENTIALS automatically
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/service-account.json" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Distribute APK
        # Note: If your release build requires a signing config (keystore), 
        # ensure you set that up in build.gradle.kts or distribute the Debug APK instead.
        run: ./gradlew :composeApp:appDistributionUploadRelease

      - name: Clean up credentials
        if: always()
        run: rm -f service-account.json
